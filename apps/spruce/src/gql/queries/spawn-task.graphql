#import "../fragments/baseTask.graphql"

query SpawnTask($taskId: String!) {
  task(taskId: $taskId, execution: 0) {
    ...BaseTask
    executionSteps {
      blockType
      commandName
      displayName
      functionName
      isFunction
      stepNumber
    }
    project {
      id
      debugSpawnHostsDisabled
      spawnHostScriptPath
    }
  }
}
