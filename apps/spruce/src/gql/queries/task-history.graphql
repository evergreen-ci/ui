query TaskHistory($options: TaskHistoryOpts!, $includeGenerator: Boolean!) {
  taskHistory(options: $options) {
    pagination {
      mostRecentTaskOrder
      oldestTaskOrder
    }
    tasks {
      id
      activated
      canRestart
      canSchedule
      canSetPriority
      displayStatus
      execution
      generator @include(if: $includeGenerator) {
        id
        execution
        ingestTime
      }
      ingestTime
      latestExecution
      order
      priority
      revision
      tests(opts: { statuses: ["fail", "silentfail"] }) {
        testResults {
          id
          logs {
            urlParsley
          }
          status
          testFile
        }
      }
      version {
        id
        message
        user {
          id
          displayName
        }
      }
    }
  }
}
