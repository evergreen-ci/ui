functions:
  assume-ec2-role:
    command: ec2.assume_role
    params:
      role_arn: ${ASSUME_ROLE_ARN}

  # Assume role with access to each user's staging bucket.
  assume-user-staging-ec2-role:
    command: ec2.assume_role
    params:
      role_arn: ${USER_STAGING_ARN}

  check-codegen:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          ./scripts/check_codegen.sh

  get-project:
    command: git.get_project
    type: setup
    params:
      directory: ui
      shallow_clone: true

  generate-token:
    - command: github.generate_token
      type: setup
      params:
        expansion_name: github_token
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - "-c"
          - |
            # Set GitHub app dynamic token to ensure it can clone non-public repos for Go modules.
            git config --global url."https://x-access-token:${github_token}@github.com/evergreen-ci/".insteadOf https://github.com/evergreen-ci/

  run-make-background:
    command: subprocess.exec
    params:
      working_dir: ui/evergreen
      binary: make
      args: ["${make_args|}", "${target}"]
      background: true
      env:
        SETTINGS_OVERRIDE: file
        GOROOT: ${goroot}

  seed-bucket-data:
    command: s3.get
    type: setup
    params:
      role_arn: ${ASSUME_ROLE_ARN}
      extract_to: ui/evergreen
      remote_file: _bucketdata.tar.gz
      bucket: parsley-test

  setup-mongodb:
    - command: subprocess.exec
      type: setup
      params:
        env:
          gobin: ${goroot}/bin/go
          MONGODB_URL: ${mongodb_url_2204}
          MONGODB_DECOMPRESS: ${decompress}
        working_dir: ui/evergreen
        command: make get-mongodb
    - command: subprocess.exec
      type: setup
      params:
        env:
          gobin: ${goroot}/bin/go
          MONGOSH_URL: ${mongosh_url_2204}
          MONGOSH_DECOMPRESS: ${decompress}
        working_dir: ui/evergreen
        command: make get-mongosh
    - command: subprocess.exec
      type: setup
      params:
        background: true
        # Turn off silent to enable DB logging for debugging purposes
        silent: true
        working_dir: ui/evergreen
        binary: bash
        args:
          - "-c"
          - |
            mkdir -p bin
            make start-mongod > bin/mongod-logs.txt 2>&1
    - command: subprocess.exec
      type: setup
      params:
        working_dir: ui/evergreen
        command: make configure-mongod
    - command: subprocess.exec
      type: setup
      params:
        binary: bash
        args:
          - "-c"
          - |
            ${PREPARE_SHELL}
            cd $PROJECT_DIRECTORY
            mkdir mongodb-tools && cd mongodb-tools
            curl ${mongodb_tools_url} -o mongodb-tools.tgz
            ${decompress} mongodb-tools.tgz
            mv ./mongodb-*/bin/* .

  setup-node:
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - ui/.evergreen/scripts/prepare-shell.sh
    - command: expansions.update
      params:
        file: expansion.yml
    - command: subprocess.exec
      params:
        exec_timeout_secs: 60
        binary: bash
        args:
          - "-c"
          - |
            ${PREPARE_SHELL}

            # Download Node.js directly from official releases (with retries).
            curl --output nodejs.tar.xz --fail --retry 5 --retry-delay 10 "https://nodejs.org/dist/v${node_version}/node-v${node_version}-linux-x64.tar.xz"
            tar xf nodejs.tar.xz
            mv "node-v${node_version}-linux-x64" "$NODE_HOME"

            # Enable pnpm via corepack (uses packageManager field in package.json).
            corepack enable pnpm

  symlink:
    command: subprocess.exec
    params:
      working_dir: ui
      binary: bash
      args:
        - "-c"
        - |
          ln -s ${workdir}/ui/evergreen/graphql/schema ${app_dir}/sdlschema

  wait-for-evergreen:
    command: subprocess.exec
    type: setup
    params:
      exec_timeout_secs: 600
      timeout_secs: 1800
      working_dir: ui/.evergreen
      binary: bash
      args:
        - scripts/wait-for-evergreen.sh

  pnpm-build:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm build:local

  pnpm-playwright:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      env:
        # Installs browsers to node_modules.
        PLAYWRIGHT_BROWSERS_PATH: "0"
        STAGING_RUNTIME_ENVIRONMENTS_BASE_URL: ${staging_runtime_environments_base_url}
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}

          # Install Chromium browser to use with Playwright tests.
          pnpm exec playwright install chromium

          # Allow spec filtering for an intentional patch.
          if [[ "${playwright_spec}" != "" ]]; then
            pnpm playwright:test ${playwright_spec}
          else
            pnpm playwright:test
          fi

  pnpm-eslint:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm eslint:strict

  pnpm-install:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm install

  pnpm-preview:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      background: true
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm preview --no-request-logging

  pnpm-serve:
    command: subprocess.exec
    type: setup
    params:
      working_dir: ui/${app_dir}
      background: true
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm serve

  pnpm-storybook-build:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm storybook:build

  pnpm-test:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm test

  pnpm-tsc:
    command: subprocess.exec
    params:
      working_dir: ui/${app_dir}
      binary: bash
      args:
        - "-c"
        - |
          ${PREPARE_SHELL}
          pnpm check-types

  pnpm-verify-backend:
    command: subprocess.exec
    params:
      working_dir: ui/.evergreen
      command: bash scripts/verify-backend.sh

tasks:
  - name: check_codegen
    commands:
      - func: symlink
      - func: check-codegen

  - name: compile
    commands:
      - func: symlink
      - func: pnpm-build

  - name: e2e
    commands:
      - func: setup-mongodb
      - func: generate-token
      - func: run-make-background
        vars:
          target: local-evergreen
      - func: symlink
      - func: seed-bucket-data
      - func: pnpm-build
      - func: pnpm-preview
      - func: wait-for-evergreen
      - func: pnpm-verify-backend
      - func: pnpm-playwright

  - name: lint
    commands:
      - func: symlink
      - func: pnpm-eslint

  - name: storybook
    commands:
      - func: pnpm-storybook-build

  - name: test
    commands:
    - func: pnpm-test

  - name: type_check
    commands:
      - func: symlink
      - func: pnpm-tsc
